<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 600" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="pa" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
    </marker>
    <marker id="pa-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#dc2626"/>
    </marker>
    <filter id="s5" x="-3%" y="-3%" width="108%" height="112%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#94a3b8" flood-opacity="0.2"/>
    </filter>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdfa;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ccfbf1;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <rect width="1050" height="600" fill="url(#bg5)" rx="12"/>
  <text x="525" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Classification Propagation Through Lineage</text>
  <text x="525" y="55" text-anchor="middle" font-size="12" fill="#64748b">When propagate=true, tags automatically flow to all downstream entities</text>

  <!-- SCENARIO 1: Normal Propagation -->
  <rect x="20" y="75" width="1010" height="200" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#s5)"/>
  <text x="40" y="100" font-size="14" font-weight="700" fill="#16a34a">Scenario A: propagate = true (tags flow downstream)</text>

  <!-- Source with direct tag -->
  <rect x="50" y="120" width="150" height="55" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="125" y="143" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">employees</text>
  <rect x="55" y="153" width="60" height="18" rx="9" fill="#dc2626"/>
  <text x="85" y="166" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">PII</text>
  <text x="120" y="166" font-size="8" fill="#dc2626">direct</text>

  <line x1="200" y1="147" x2="268" y2="147" stroke="#475569" stroke-width="2" marker-end="url(#pa)"/>

  <!-- Process -->
  <rect x="280" y="132" width="70" height="30" rx="15" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="315" y="152" text-anchor="middle" font-size="9" fill="#6d28d9">CTAS</text>

  <line x1="350" y1="147" x2="418" y2="147" stroke="#475569" stroke-width="2" marker-end="url(#pa)"/>

  <!-- Target 1 - propagated -->
  <rect x="430" y="120" width="160" height="55" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="510" y="143" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">dept_summary</text>
  <rect x="435" y="153" width="60" height="18" rx="9" fill="#f87171"/>
  <text x="465" y="166" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">PII</text>
  <text x="502" y="166" font-size="8" fill="#f87171">propagated</text>

  <line x1="590" y1="147" x2="648" y2="147" stroke="#475569" stroke-width="2" marker-end="url(#pa)"/>

  <!-- Process 2 -->
  <rect x="660" y="132" width="70" height="30" rx="15" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="695" y="152" text-anchor="middle" font-size="9" fill="#6d28d9">SELECT</text>

  <line x1="730" y1="147" x2="798" y2="147" stroke="#475569" stroke-width="2" marker-end="url(#pa)"/>

  <!-- Target 2 - propagated -->
  <rect x="810" y="120" width="160" height="55" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="890" y="143" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">final_report</text>
  <rect x="815" y="153" width="60" height="18" rx="9" fill="#f87171"/>
  <text x="845" y="166" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">PII</text>
  <text x="882" y="166" font-size="8" fill="#f87171">propagated</text>

  <!-- Propagation arrow decoration -->
  <text x="320" y="118" text-anchor="middle" font-size="22" fill="#16a34a">--></text>
  <text x="525" y="200" text-anchor="middle" font-size="10" fill="#16a34a" font-weight="600">PII tag automatically flows through the entire lineage chain</text>

  <!-- Second branch from source -->
  <line x1="125" y1="175" x2="125" y2="210" stroke="#475569" stroke-width="1.5"/>
  <line x1="125" y1="210" x2="280" y2="210" stroke="#475569" stroke-width="2" marker-end="url(#pa)"/>
  <rect x="280" y="195" width="70" height="30" rx="15" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="315" y="215" text-anchor="middle" font-size="9" fill="#6d28d9">INSERT</text>
  <line x1="350" y1="210" x2="418" y2="210" stroke="#475569" stroke-width="2" marker-end="url(#pa)"/>
  <rect x="430" y="193" width="160" height="48" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="510" y="213" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">eng_team</text>
  <rect x="435" y="222" width="60" height="16" rx="8" fill="#f87171"/>
  <text x="465" y="233" text-anchor="middle" font-size="8" font-weight="600" fill="#fff">PII</text>
  <text x="502" y="233" font-size="7" fill="#f87171">propagated</text>

  <!-- SCENARIO 2: Blocked Propagation -->
  <rect x="20" y="290" width="1010" height="140" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#s5)"/>
  <text x="40" y="318" font-size="14" font-weight="700" fill="#dc2626">Scenario B: Blocked Propagation on Edge</text>
  <text x="40" y="335" font-size="10" fill="#64748b">You can block specific tags from propagating through a lineage edge</text>

  <!-- Source -->
  <rect x="50" y="352" width="150" height="50" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="125" y="373" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">employees</text>
  <rect x="55" y="382" width="50" height="16" rx="8" fill="#dc2626"/>
  <text x="80" y="393" text-anchor="middle" font-size="8" font-weight="600" fill="#fff">PII</text>

  <!-- Blocked edge -->
  <line x1="200" y1="377" x2="280" y2="377" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="240" y="368" text-anchor="middle" font-size="18" fill="#dc2626" font-weight="700">X</text>
  <text x="240" y="400" text-anchor="middle" font-size="8" fill="#dc2626" font-weight="600">PII BLOCKED</text>

  <rect x="280" y="362" width="70" height="30" rx="15" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="315" y="382" text-anchor="middle" font-size="9" fill="#6d28d9">CTAS</text>

  <line x1="350" y1="377" x2="418" y2="377" stroke="#475569" stroke-width="2" marker-end="url(#pa)"/>

  <!-- Target - NO tag -->
  <rect x="430" y="352" width="170" height="50" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <text x="515" y="373" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">masked_summary</text>
  <text x="515" y="393" text-anchor="middle" font-size="9" fill="#94a3b8" font-style="italic">No PII tag (blocked)</text>

  <!-- Explanation -->
  <rect x="650" y="345" width="340" height="65" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="820" y="368" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b">When to block propagation:</text>
  <text x="820" y="385" text-anchor="middle" font-size="9" fill="#475569">When a transformation removes sensitive data</text>
  <text x="820" y="399" text-anchor="middle" font-size="9" fill="#475569">(e.g., after masking, aggregation, anonymization)</text>

  <!-- SCENARIO 3: Three control mechanisms -->
  <rect x="20" y="445" width="1010" height="140" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#s5)"/>
  <text x="525" y="473" text-anchor="middle" font-size="14" font-weight="700" fill="#475569">Three Controls for Propagation</text>

  <!-- Control 1 -->
  <rect x="50" y="488" width="280" height="80" rx="8" fill="#f0f9ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="190" y="510" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">1. propagate flag on tag</text>
  <text x="190" y="528" text-anchor="middle" font-size="10" fill="#334155">Set propagate: true or false</text>
  <text x="190" y="544" text-anchor="middle" font-size="10" fill="#334155">when assigning the classification</text>
  <text x="190" y="560" text-anchor="middle" font-size="9" fill="#64748b">Default: true</text>

  <!-- Control 2 -->
  <rect x="370" y="488" width="280" height="80" rx="8" fill="#fefce8" stroke="#d97706" stroke-width="1.5"/>
  <text x="510" y="510" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">2. Edge propagation toggle</text>
  <text x="510" y="528" text-anchor="middle" font-size="10" fill="#334155">Disable propagation for an</text>
  <text x="510" y="544" text-anchor="middle" font-size="10" fill="#334155">entire lineage edge (arrow)</text>
  <text x="510" y="560" text-anchor="middle" font-size="9" fill="#64748b">Blocks ALL tags on that edge</text>

  <!-- Control 3 -->
  <rect x="690" y="488" width="300" height="80" rx="8" fill="#fdf2f8" stroke="#db2777" stroke-width="1.5"/>
  <text x="840" y="510" text-anchor="middle" font-size="11" font-weight="700" fill="#9d174d">3. Blocked tags list on edge</text>
  <text x="840" y="528" text-anchor="middle" font-size="10" fill="#334155">Block specific tags on a specific</text>
  <text x="840" y="544" text-anchor="middle" font-size="10" fill="#334155">lineage edge while allowing others</text>
  <text x="840" y="560" text-anchor="middle" font-size="9" fill="#64748b">e.g., block PII but allow FINANCIAL</text>
</svg>