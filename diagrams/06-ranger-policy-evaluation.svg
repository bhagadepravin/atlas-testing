<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 680" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="pe" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
    </marker>
    <filter id="s6" x="-3%" y="-3%" width="108%" height="112%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#94a3b8" flood-opacity="0.2"/>
    </filter>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fef2f2;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#fee2e2;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <rect width="800" height="680" fill="url(#bg6)" rx="12"/>
  <text x="400" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Ranger Policy Evaluation Order</text>
  <text x="400" y="55" text-anchor="middle" font-size="12" fill="#64748b">Tag-based policies take precedence over resource-based policies</text>

  <!-- User query entry -->
  <rect x="280" y="80" width="240" height="50" rx="10" fill="#fff" stroke="#2563eb" stroke-width="2" filter="url(#s6)"/>
  <text x="400" y="102" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">User runs: SELECT * FROM employees</text>
  <text x="400" y="120" text-anchor="middle" font-size="10" fill="#64748b">Query intercepted by Ranger plugin</text>

  <line x1="400" y1="130" x2="400" y2="165" stroke="#475569" stroke-width="2" marker-end="url(#pe)"/>

  <!-- Step 1: Tag DENY -->
  <rect x="40" y="170" width="340" height="75" rx="10" fill="#fff" stroke="#dc2626" stroke-width="2.5" filter="url(#s6)"/>
  <circle cx="70" cy="195" r="18" fill="#dc2626"/>
  <text x="70" y="201" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">1</text>
  <text x="210" y="196" text-anchor="middle" font-size="13" font-weight="700" fill="#dc2626">Tag-Based DENY</text>
  <text x="210" y="214" text-anchor="middle" font-size="10" fill="#64748b">Check: Is entity tagged with a classification</text>
  <text x="210" y="228" text-anchor="middle" font-size="10" fill="#64748b">that has a DENY policy for this user?</text>

  <!-- Priority label -->
  <rect x="390" y="185" width="120" height="30" rx="6" fill="#dc2626"/>
  <text x="450" y="205" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">HIGHEST</text>

  <!-- Match/No match arrows -->
  <rect x="560" y="180" width="190" height="50" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="655" y="200" text-anchor="middle" font-size="11" font-weight="600" fill="#dc2626">Match = ACCESS DENIED</text>
  <text x="655" y="218" text-anchor="middle" font-size="9" fill="#991b1b">Cannot be overridden</text>
  <line x1="510" y1="195" x2="558" y2="205" stroke="#dc2626" stroke-width="1.5" marker-end="url(#pe)"/>

  <line x1="210" y1="245" x2="210" y2="280" stroke="#475569" stroke-width="2" marker-end="url(#pe)"/>
  <text x="230" y="268" font-size="9" fill="#64748b">no match</text>

  <!-- Step 2: Tag ALLOW -->
  <rect x="40" y="285" width="340" height="75" rx="10" fill="#fff" stroke="#ea580c" stroke-width="2.5" filter="url(#s6)"/>
  <circle cx="70" cy="310" r="18" fill="#ea580c"/>
  <text x="70" y="316" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">2</text>
  <text x="210" y="311" text-anchor="middle" font-size="13" font-weight="700" fill="#ea580c">Tag-Based ALLOW</text>
  <text x="210" y="329" text-anchor="middle" font-size="10" fill="#64748b">Check: Is entity tagged with a classification</text>
  <text x="210" y="343" text-anchor="middle" font-size="10" fill="#64748b">that has an ALLOW policy for this user?</text>

  <rect x="560" y="295" width="190" height="50" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <text x="655" y="315" text-anchor="middle" font-size="11" font-weight="600" fill="#ea580c">Match = ACCESS ALLOWED</text>
  <text x="655" y="333" text-anchor="middle" font-size="9" fill="#c2410c">(+ apply masking if defined)</text>
  <line x1="380" y1="310" x2="558" y2="320" stroke="#ea580c" stroke-width="1.5" marker-end="url(#pe)"/>

  <line x1="210" y1="360" x2="210" y2="395" stroke="#475569" stroke-width="2" marker-end="url(#pe)"/>
  <text x="230" y="383" font-size="9" fill="#64748b">no match</text>

  <!-- Step 3: Resource DENY -->
  <rect x="40" y="400" width="340" height="75" rx="10" fill="#fff" stroke="#d97706" stroke-width="2.5" filter="url(#s6)"/>
  <circle cx="70" cy="425" r="18" fill="#d97706"/>
  <text x="70" y="431" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">3</text>
  <text x="210" y="426" text-anchor="middle" font-size="13" font-weight="700" fill="#d97706">Resource-Based DENY</text>
  <text x="210" y="444" text-anchor="middle" font-size="10" fill="#64748b">Check: Is there a resource DENY policy</text>
  <text x="210" y="458" text-anchor="middle" font-size="10" fill="#64748b">for this db/table/column for this user?</text>

  <rect x="560" y="410" width="190" height="50" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="655" y="430" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Match = ACCESS DENIED</text>
  <text x="655" y="448" text-anchor="middle" font-size="9" fill="#92400e">Unless overridden by exception</text>
  <line x1="380" y1="435" x2="558" y2="435" stroke="#d97706" stroke-width="1.5" marker-end="url(#pe)"/>

  <line x1="210" y1="475" x2="210" y2="510" stroke="#475569" stroke-width="2" marker-end="url(#pe)"/>
  <text x="230" y="498" font-size="9" fill="#64748b">no match</text>

  <!-- Step 4: Resource ALLOW -->
  <rect x="40" y="515" width="340" height="75" rx="10" fill="#fff" stroke="#16a34a" stroke-width="2.5" filter="url(#s6)"/>
  <circle cx="70" cy="540" r="18" fill="#16a34a"/>
  <text x="70" y="546" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">4</text>
  <text x="210" y="541" text-anchor="middle" font-size="13" font-weight="700" fill="#16a34a">Resource-Based ALLOW</text>
  <text x="210" y="559" text-anchor="middle" font-size="10" fill="#64748b">Check: Is there a resource ALLOW policy</text>
  <text x="210" y="573" text-anchor="middle" font-size="10" fill="#64748b">for this db/table/column for this user?</text>

  <rect x="560" y="525" width="190" height="50" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="655" y="545" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Match = ACCESS ALLOWED</text>
  <text x="655" y="563" text-anchor="middle" font-size="9" fill="#166534">(standard resource policy)</text>
  <line x1="380" y1="552" x2="558" y2="550" stroke="#16a34a" stroke-width="1.5" marker-end="url(#pe)"/>

  <line x1="210" y1="590" x2="210" y2="618" stroke="#475569" stroke-width="2" marker-end="url(#pe)"/>
  <text x="230" y="610" font-size="9" fill="#64748b">no match</text>

  <!-- Step 5: Default DENY -->
  <rect x="100" y="625" width="220" height="40" rx="10" fill="#7f1d1d" filter="url(#s6)"/>
  <text x="210" y="650" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">5. DEFAULT: DENY</text>

  <rect x="390" y="625" width="360" height="40" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="570" y="650" text-anchor="middle" font-size="11" fill="#991b1b">If no policy matches at any level, access is DENIED by default</text>
</svg>