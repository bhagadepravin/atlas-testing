<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="inh" markerWidth="12" markerHeight="10" refX="12" refY="5" orient="auto">
      <polygon points="0 0, 12 5, 0 10" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
    </marker>
    <filter id="s4" x="-3%" y="-3%" width="108%" height="112%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#94a3b8" flood-opacity="0.2"/>
    </filter>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fffbeb;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#fef3c7;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <rect width="900" height="520" fill="url(#bg4)" rx="12"/>
  <text x="450" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Classification (Tag) Hierarchy</text>
  <text x="450" y="58" text-anchor="middle" font-size="12" fill="#64748b">Child classifications inherit from parents - Ranger policies on parent apply to all children</text>

  <!-- PII Parent -->
  <rect x="340" y="90" width="220" height="70" rx="12" fill="#fff" stroke="#dc2626" stroke-width="2.5" filter="url(#s4)"/>
  <rect x="340" y="90" width="220" height="26" rx="12" fill="#dc2626"/>
  <rect x="340" y="106" width="220" height="10" fill="#dc2626"/>
  <text x="450" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">PII</text>
  <text x="450" y="135" text-anchor="middle" font-size="10" fill="#64748b">Personally Identifiable Information</text>
  <text x="450" y="150" text-anchor="middle" font-size="9" fill="#94a3b8">Attr: pii_type (string)</text>

  <!-- Children of PII -->
  <!-- PII_NAME -->
  <line x1="370" y1="160" x2="140" y2="210" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="50" y="210" width="180" height="55" rx="10" fill="#fff" stroke="#7c3aed" stroke-width="2" filter="url(#s4)"/>
  <rect x="50" y="210" width="180" height="22" rx="10" fill="#7c3aed"/>
  <rect x="50" y="226" width="180" height="6" fill="#7c3aed"/>
  <text x="140" y="226" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">PII_NAME</text>
  <text x="140" y="250" text-anchor="middle" font-size="10" fill="#64748b">Person Name</text>
  <text x="50" y="198" font-size="9" fill="#7c3aed" font-style="italic">extends PII</text>

  <!-- PII_EMAIL -->
  <line x1="410" y1="160" x2="320" y2="210" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="260" y="210" width="180" height="55" rx="10" fill="#fff" stroke="#7c3aed" stroke-width="2" filter="url(#s4)"/>
  <rect x="260" y="210" width="180" height="22" rx="10" fill="#7c3aed"/>
  <rect x="260" y="226" width="180" height="6" fill="#7c3aed"/>
  <text x="350" y="226" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">PII_EMAIL</text>
  <text x="350" y="250" text-anchor="middle" font-size="10" fill="#64748b">Email Address</text>

  <!-- PII_SSN -->
  <line x1="490" y1="160" x2="560" y2="210" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="470" y="210" width="180" height="55" rx="10" fill="#fff" stroke="#7c3aed" stroke-width="2" filter="url(#s4)"/>
  <rect x="470" y="210" width="180" height="22" rx="10" fill="#7c3aed"/>
  <rect x="470" y="226" width="180" height="6" fill="#7c3aed"/>
  <text x="560" y="226" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">PII_SSN</text>
  <text x="560" y="250" text-anchor="middle" font-size="10" fill="#64748b">Social Security Number</text>

  <!-- PII_PHONE -->
  <line x1="530" y1="160" x2="770" y2="210" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="680" y="210" width="180" height="55" rx="10" fill="#fff" stroke="#7c3aed" stroke-width="2" filter="url(#s4)"/>
  <rect x="680" y="210" width="180" height="22" rx="10" fill="#7c3aed"/>
  <rect x="680" y="226" width="180" height="6" fill="#7c3aed"/>
  <text x="770" y="226" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">PII_PHONE</text>
  <text x="770" y="250" text-anchor="middle" font-size="10" fill="#64748b">Phone Number</text>

  <!-- Other independent classifications -->
  <text x="450" y="310" text-anchor="middle" font-size="14" font-weight="700" fill="#475569">Other Independent Classifications</text>

  <rect x="40" y="330" width="170" height="55" rx="10" fill="#fff" stroke="#ea580c" stroke-width="2" filter="url(#s4)"/>
  <rect x="40" y="330" width="170" height="22" rx="10" fill="#ea580c"/>
  <rect x="40" y="346" width="170" height="6" fill="#ea580c"/>
  <text x="125" y="347" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">SENSITIVE</text>
  <text x="125" y="370" text-anchor="middle" font-size="9" fill="#64748b">Attr: sensitivity_level</text>

  <rect x="240" y="330" width="170" height="55" rx="10" fill="#fff" stroke="#2563eb" stroke-width="2" filter="url(#s4)"/>
  <rect x="240" y="330" width="170" height="22" rx="10" fill="#2563eb"/>
  <rect x="240" y="346" width="170" height="6" fill="#2563eb"/>
  <text x="325" y="347" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">FINANCIAL</text>
  <text x="325" y="370" text-anchor="middle" font-size="9" fill="#64748b">Attr: regulation</text>

  <rect x="440" y="330" width="170" height="55" rx="10" fill="#fff" stroke="#16a34a" stroke-width="2" filter="url(#s4)"/>
  <rect x="440" y="330" width="170" height="22" rx="10" fill="#16a34a"/>
  <rect x="440" y="346" width="170" height="6" fill="#16a34a"/>
  <text x="525" y="347" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">CONFIDENTIAL</text>
  <text x="525" y="370" text-anchor="middle" font-size="9" fill="#64748b">Company confidential</text>

  <rect x="640" y="330" width="170" height="55" rx="10" fill="#fff" stroke="#d97706" stroke-width="2" filter="url(#s4)"/>
  <rect x="640" y="330" width="170" height="22" rx="10" fill="#d97706"/>
  <rect x="640" y="346" width="170" height="6" fill="#d97706"/>
  <text x="725" y="347" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">PHI</text>
  <text x="725" y="370" text-anchor="middle" font-size="9" fill="#64748b">Protected Health Info</text>

  <!-- Key benefit box -->
  <rect x="80" y="420" width="740" height="80" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="450" y="448" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">Key Benefit of Hierarchy</text>
  <text x="450" y="468" text-anchor="middle" font-size="11" fill="#334155">A single Ranger policy on "PII" automatically applies to PII_NAME, PII_EMAIL, PII_SSN, and PII_PHONE.</text>
  <text x="450" y="488" text-anchor="middle" font-size="11" fill="#334155">This means you don't need separate policies for each sub-type - one policy governs them all.</text>
</svg>