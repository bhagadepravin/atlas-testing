<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 950" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="la" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
    </marker>
    <marker id="la-p" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7c3aed"/>
    </marker>
    <filter id="ds" x="-3%" y="-3%" width="108%" height="112%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#94a3b8" flood-opacity="0.2"/>
    </filter>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#faf5ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f3e8ff;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <rect width="1100" height="950" fill="url(#bg3)" rx="12"/>
  <text x="550" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Atlas Lineage Patterns</text>
  <text x="550" y="58" text-anchor="middle" font-size="13" fill="#64748b">Six common lineage patterns you'll encounter in data governance</text>

  <!-- ===== PATTERN 1: Simple ===== -->
  <rect x="30" y="80" width="500" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#ds)"/>
  <text x="50" y="105" font-size="14" font-weight="700" fill="#7c3aed">1. Simple Lineage (CTAS)</text>
  <text x="50" y="120" font-size="10" fill="#64748b">CREATE TABLE summary AS SELECT ... FROM employees</text>

  <rect x="60" y="138" width="120" height="40" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="120" y="163" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">employees</text>

  <line x1="180" y1="158" x2="230" y2="158" stroke="#475569" stroke-width="2" marker-end="url(#la)"/>

  <rect x="242" y="140" width="90" height="36" rx="18" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="287" y="163" text-anchor="middle" font-size="9" font-weight="600" fill="#6d28d9">CTAS query</text>

  <line x1="332" y1="158" x2="382" y2="158" stroke="#475569" stroke-width="2" marker-end="url(#la)"/>

  <rect x="394" y="138" width="120" height="40" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="454" y="163" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">summary</text>

  <!-- ===== PATTERN 2: Through View ===== -->
  <rect x="570" y="80" width="500" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#ds)"/>
  <text x="590" y="105" font-size="14" font-weight="700" fill="#7c3aed">2. Through Views (Multi-Hop)</text>
  <text x="590" y="120" font-size="10" fill="#64748b">employees -> view -> report table</text>

  <rect x="590" y="138" width="100" height="40" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="640" y="163" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">employees</text>

  <line x1="690" y1="158" x2="720" y2="158" stroke="#475569" stroke-width="1.5" marker-end="url(#la)"/>

  <rect x="732" y="140" width="60" height="36" rx="18" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1"/>
  <text x="762" y="162" text-anchor="middle" font-size="8" fill="#6d28d9">process</text>

  <line x1="792" y1="158" x2="812" y2="158" stroke="#475569" stroke-width="1.5" marker-end="url(#la)"/>

  <rect x="824" y="138" width="80" height="40" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="864" y="163" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">view</text>

  <line x1="904" y1="158" x2="924" y2="158" stroke="#475569" stroke-width="1.5" marker-end="url(#la)"/>

  <rect x="936" y="140" width="60" height="36" rx="18" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1"/>
  <text x="966" y="162" text-anchor="middle" font-size="8" fill="#6d28d9">process</text>

  <line x1="996" y1="158" x2="1016" y2="158" stroke="#475569" stroke-width="1.5" marker-end="url(#la)"/>

  <rect x="1020" y="138" width="40" height="40" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="1040" y="163" text-anchor="middle" font-size="9" font-weight="600" fill="#166534">rpt</text>

  <!-- ===== PATTERN 3: Multi-Source (JOIN) ===== -->
  <rect x="30" y="220" width="500" height="150" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#ds)"/>
  <text x="50" y="245" font-size="14" font-weight="700" fill="#7c3aed">3. Multi-Source / JOIN</text>
  <text x="50" y="260" font-size="10" fill="#64748b">Two tables joined into one target</text>

  <rect x="60" y="278" width="120" height="36" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="120" y="301" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">employees</text>

  <rect x="60" y="326" width="120" height="36" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="120" y="349" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">departments</text>

  <line x1="180" y1="296" x2="245" y2="315" stroke="#475569" stroke-width="2" marker-end="url(#la)"/>
  <line x1="180" y1="344" x2="245" y2="325" stroke="#475569" stroke-width="2" marker-end="url(#la)"/>

  <rect x="257" y="302" width="90" height="36" rx="18" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="302" y="324" text-anchor="middle" font-size="9" font-weight="600" fill="#6d28d9">JOIN query</text>

  <line x1="347" y1="320" x2="397" y2="320" stroke="#475569" stroke-width="2" marker-end="url(#la)"/>

  <rect x="409" y="302" width="105" height="36" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="462" y="325" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">emp_dept_rpt</text>

  <!-- ===== PATTERN 4: Diamond ===== -->
  <rect x="570" y="220" width="500" height="150" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#ds)"/>
  <text x="590" y="245" font-size="14" font-weight="700" fill="#7c3aed">4. Diamond Lineage</text>
  <text x="590" y="260" font-size="10" fill="#64748b">Same source, two paths, converging at target</text>

  <rect x="600" y="296" width="90" height="36" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="645" y="319" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">employees</text>

  <line x1="690" y1="304" x2="738" y2="290" stroke="#475569" stroke-width="1.5" marker-end="url(#la)"/>
  <line x1="690" y1="324" x2="738" y2="338" stroke="#475569" stroke-width="1.5" marker-end="url(#la)"/>

  <rect x="750" y="274" width="100" height="32" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="800" y="295" text-anchor="middle" font-size="9" font-weight="600" fill="#92400e">high_salary</text>

  <rect x="750" y="322" width="100" height="32" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="800" y="343" text-anchor="middle" font-size="9" font-weight="600" fill="#92400e">senior_emps</text>

  <line x1="850" y1="290" x2="920" y2="310" stroke="#475569" stroke-width="1.5" marker-end="url(#la)"/>
  <line x1="850" y1="338" x2="920" y2="318" stroke="#475569" stroke-width="1.5" marker-end="url(#la)"/>

  <rect x="932" y="298" width="110" height="32" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="987" y="319" text-anchor="middle" font-size="9" font-weight="600" fill="#166534">elite_employees</text>

  <!-- ===== PATTERN 5: Fan-Out ===== -->
  <rect x="30" y="390" width="500" height="180" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#ds)"/>
  <text x="50" y="415" font-size="14" font-weight="700" fill="#7c3aed">5. Fan-Out (One to Many)</text>
  <text x="50" y="430" font-size="10" fill="#64748b">Single source feeding multiple targets</text>

  <rect x="60" y="460" width="120" height="40" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="120" y="485" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">employees</text>

  <line x1="180" y1="468" x2="290" y2="448" stroke="#475569" stroke-width="1.5" marker-end="url(#la)"/>
  <line x1="180" y1="475" x2="290" y2="473" stroke="#475569" stroke-width="1.5" marker-end="url(#la)"/>
  <line x1="180" y1="482" x2="290" y2="498" stroke="#475569" stroke-width="1.5" marker-end="url(#la)"/>
  <line x1="180" y1="490" x2="290" y2="523" stroke="#475569" stroke-width="1.5" marker-end="url(#la)"/>

  <rect x="302" y="435" width="130" height="28" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="367" y="454" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">marketing_rpt</text>

  <rect x="302" y="468" width="130" height="28" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="367" y="487" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">hr_report</text>

  <rect x="302" y="501" width="130" height="28" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="367" y="520" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">finance_report</text>

  <rect x="302" y="534" width="130" height="28" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="367" y="553" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">eng_report</text>

  <!-- ===== PATTERN 6: Fan-In ===== -->
  <rect x="570" y="390" width="500" height="180" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#ds)"/>
  <text x="590" y="415" font-size="14" font-weight="700" fill="#7c3aed">6. Fan-In (Many to One)</text>
  <text x="590" y="430" font-size="10" fill="#64748b">Multiple sources combined via UNION ALL</text>

  <rect x="600" y="444" width="110" height="28" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="655" y="463" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">employees</text>

  <rect x="600" y="480" width="110" height="28" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="655" y="499" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">contractors</text>

  <rect x="600" y="516" width="110" height="28" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="655" y="535" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">interns</text>

  <line x1="710" y1="458" x2="830" y2="487" stroke="#475569" stroke-width="1.5" marker-end="url(#la)"/>
  <line x1="710" y1="494" x2="830" y2="494" stroke="#475569" stroke-width="1.5" marker-end="url(#la)"/>
  <line x1="710" y1="530" x2="830" y2="501" stroke="#475569" stroke-width="1.5" marker-end="url(#la)"/>

  <rect x="842" y="478" width="130" height="36" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="907" y="501" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">all_workforce</text>

  <!-- ===== PATTERN 7: Full Data Warehouse (large) ===== -->
  <rect x="30" y="590" width="1040" height="340" rx="12" fill="#fff" stroke="#7c3aed" stroke-width="2" filter="url(#ds)"/>
  <text x="550" y="618" text-anchor="middle" font-size="16" font-weight="700" fill="#7c3aed">7. Multi-Layer Data Warehouse Pipeline</text>
  <text x="550" y="636" text-anchor="middle" font-size="11" fill="#64748b">Raw -> Staging -> Curated -> Reporting  (the most complex and realistic pattern)</text>

  <!-- Layer labels -->
  <rect x="55" y="655" width="90" height="24" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="100" y="672" text-anchor="middle" font-size="10" font-weight="700" fill="#991b1b">RAW</text>

  <rect x="285" y="655" width="90" height="24" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="330" y="672" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">STAGING</text>

  <rect x="535" y="655" width="90" height="24" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="580" y="672" text-anchor="middle" font-size="10" font-weight="700" fill="#1e40af">CURATED</text>

  <rect x="825" y="655" width="100" height="24" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="875" y="672" text-anchor="middle" font-size="10" font-weight="700" fill="#166534">REPORTING</text>

  <!-- Raw tables -->
  <rect x="50" y="700" width="150" height="40" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="125" y="725" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b">raw_transactions</text>

  <rect x="50" y="760" width="150" height="40" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="125" y="785" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b">raw_products</text>

  <rect x="50" y="820" width="150" height="40" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="125" y="845" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b">raw_stores</text>

  <!-- Staging -->
  <rect x="280" y="700" width="150" height="40" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="355" y="725" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">stg_transactions</text>

  <!-- Arrows: raw -> staging -->
  <line x1="200" y1="720" x2="278" y2="720" stroke="#475569" stroke-width="2" marker-end="url(#la)"/>

  <!-- Curated -->
  <rect x="530" y="760" width="150" height="40" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="605" y="785" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">curated_sales</text>

  <!-- Arrows: staging + raw_products + raw_stores -> curated -->
  <line x1="430" y1="720" x2="528" y2="770" stroke="#475569" stroke-width="2" marker-end="url(#la)"/>
  <line x1="200" y1="780" x2="528" y2="780" stroke="#475569" stroke-width="2" marker-end="url(#la)"/>
  <line x1="200" y1="840" x2="520" y2="792" stroke="#475569" stroke-width="2" marker-end="url(#la)"/>

  <!-- Reporting tables -->
  <rect x="810" y="720" width="160" height="40" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="890" y="745" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">rpt_daily_sales</text>

  <rect x="810" y="800" width="160" height="40" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="890" y="825" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">rpt_product_perf</text>

  <!-- Arrows: curated -> reporting -->
  <line x1="680" y1="770" x2="808" y2="745" stroke="#475569" stroke-width="2" marker-end="url(#la)"/>
  <line x1="680" y1="790" x2="808" y2="815" stroke="#475569" stroke-width="2" marker-end="url(#la)"/>

  <!-- Tag propagation note -->
  <rect x="50" y="880" width="420" height="35" rx="6" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="260" y="902" text-anchor="middle" font-size="10" fill="#6d28d9">Tag PII on raw_transactions (propagate=true) -> automatically tags ALL downstream tables</text>

  <!-- Legend -->
  <rect x="580" y="875" width="460" height="45" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <rect x="600" y="890" width="30" height="14" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="638" y="901" font-size="9" fill="#475569">Raw Layer</text>
  <rect x="700" y="890" width="30" height="14" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="738" y="901" font-size="9" fill="#475569">Staging</text>
  <rect x="790" y="890" width="30" height="14" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="828" y="901" font-size="9" fill="#475569">Curated</text>
  <rect x="880" y="890" width="30" height="14" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="918" y="901" font-size="9" fill="#475569">Reporting</text>
  <rect x="980" y="890" width="36" height="14" rx="8" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1"/>
  <text x="1024" y="901" font-size="9" fill="#475569">Process</text>
</svg>